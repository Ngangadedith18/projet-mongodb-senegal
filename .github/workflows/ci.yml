# ══════════════════════════════════════════════════════════════
# Pipeline CI/CD — Projet MongoDB Alimentation Senegal
# Declencheur : push et pull_request sur la branche main
# ══════════════════════════════════════════════════════════════

name: CI — Tests et Qualite du code

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Job 1 : Verification de la structure du projet ──────────
  structure:
    name: Verification structure
    runs-on: ubuntu-latest

    steps:
      - name: Recuperation du code source
        uses: actions/checkout@v4

      - name: Verification des fichiers obligatoires
        run: |
          echo "Verification des fichiers du projet..."
          test -f app.py               && echo "OK app.py"             || (echo "ERREUR app.py manquant"        && exit 1)
          test -f db.py                && echo "OK db.py"              || (echo "ERREUR db.py manquant"         && exit 1)
          test -f import_data.py       && echo "OK import_data.py"     || (echo "ERREUR import_data.py manquant" && exit 1)
          test -f requirements.txt     && echo "OK requirements.txt"   || (echo "ERREUR requirements.txt manquant" && exit 1)
          test -f README.md            && echo "OK README.md"          || (echo "ERREUR README.md manquant"     && exit 1)
          test -f conftest.py          && echo "OK conftest.py"        || (echo "ERREUR conftest.py manquant"   && exit 1)
          test -f templates/index.html && echo "OK index.html"         || (echo "ERREUR index.html manquant"    && exit 1)
          test -f static/style.css     && echo "OK style.css"          || (echo "ERREUR style.css manquant"     && exit 1)
          test -f tests/test_db.py     && echo "OK tests/test_db.py"   || (echo "ERREUR test_db.py manquant"    && exit 1)
          echo "Structure du projet valide !"

  # ── Job 2 : Analyse de qualite du code ──────────────────────
  qualite:
    name: Analyse pylint
    runs-on: ubuntu-latest
    needs: structure

    steps:
      - name: Recuperation du code source
        uses: actions/checkout@v4

      - name: Installation de Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Installation des dependances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint

      - name: Analyse pylint sur app.py
        run: pylint app.py --fail-under=9.0

      - name: Analyse pylint sur db.py
        run: pylint db.py --fail-under=9.0

      - name: Analyse pylint sur tests/test_db.py
        run: pylint tests/test_db.py --fail-under=9.0

  # ── Job 3 : Tests unitaires avec pytest ─────────────────────
  tests:
    name: Tests unitaires pytest
    runs-on: ubuntu-latest
    needs: qualite

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Recuperation du code source
        uses: actions/checkout@v4

      - name: Installation de Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Installation des dependances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Import du dataset de test
        run: python import_data.py

      - name: Execution des tests pytest
        run: pytest tests/ -v --tb=short